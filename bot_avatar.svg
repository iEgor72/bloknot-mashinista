<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark background matching app -->
  <rect width="512" height="512" fill="#0f172a"/>

  <!-- Clock face — app card colours -->
  <circle cx="256" cy="256" r="195" fill="#1e293b"/>
  <circle cx="256" cy="256" r="187" fill="#162032"/>

  <!-- Cyan bezel — outer soft ring + sharp inner ring (no filters) -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#38bdf8" stroke-width="22" opacity="0.25"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#38bdf8" stroke-width="10" opacity="0.55"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#38bdf8" stroke-width="5"/>

  <!-- Major hour markers: 12 / 3 / 6 / 9 -->
  <rect x="249" y="76"  width="14" height="22" rx="7" fill="white" opacity="0.9"/>
  <rect x="414" y="249" width="22" height="14" rx="7" fill="white" opacity="0.9"/>
  <rect x="249" y="414" width="14" height="22" rx="7" fill="white" opacity="0.9"/>
  <rect x="76"  y="249" width="22" height="14" rx="7" fill="white" opacity="0.9"/>

  <!-- Minor hour dots (30° intervals) -->
  <circle cx="346" cy="101" r="5" fill="white" opacity="0.3"/>
  <circle cx="411" cy="166" r="5" fill="white" opacity="0.3"/>
  <circle cx="411" cy="346" r="5" fill="white" opacity="0.3"/>
  <circle cx="346" cy="411" r="5" fill="white" opacity="0.3"/>
  <circle cx="166" cy="411" r="5" fill="white" opacity="0.3"/>
  <circle cx="101" cy="346" r="5" fill="white" opacity="0.3"/>
  <circle cx="101" cy="166" r="5" fill="white" opacity="0.3"/>
  <circle cx="166" cy="101" r="5" fill="white" opacity="0.3"/>

  <!-- Minute hand: 60°, length 143 -->
  <line x1="256" y1="256" x2="380" y2="184" stroke="white" stroke-width="11" stroke-linecap="round"/>

  <!-- Hour hand: 305°, length 104 -->
  <line x1="256" y1="256" x2="171" y2="196" stroke="white" stroke-width="15" stroke-linecap="round"/>

  <!-- Second hand: cyan, 120°, no filter -->
  <line x1="224" y1="238" x2="390" y2="330" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>

  <!-- Centre cap -->
  <circle cx="256" cy="256" r="16" fill="#162032"/>
  <circle cx="256" cy="256" r="16" fill="none" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="256" cy="256" r="7"  fill="#38bdf8"/>

</svg>
